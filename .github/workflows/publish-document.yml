# Build the ABNT document and publish the DOCX as a GitHub release after the
# Docker image workflow succeeds on main.
#
# This repository doubles as a TEMPLATE for writing ABNT documents:
#   1. Fork it (or "Use this template").
#   2. Write your document in a directory containing a project.yaml
#      (the default is examples/ — see PROJECT_DIR below).
#   3. Push to main. After the model image is built and published, this
#      workflow builds the DOCX with ghcr.io/specir/specc-abnt:latest and
#      attaches it to a release.
#
# To extend: change PROJECT_DIR to your document directory, or add more
# directories to the build step — every *.docx found under <dir>/build/ is
# attached to the release.
name: Publish Document

on:
  workflow_run:
    workflows: ["Build, Test, and Publish"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  # Ready-made SpecCompiler + ABNT image. Forks keep this default; point it
  # at your own image only if you extend the model itself.
  SPECC_IMAGE: ghcr.io/specir/specc-abnt:latest
  # Directory containing your project.yaml.
  PROJECT_DIR: examples

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Build document
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${SPECC_IMAGE}" \
            build "${PROJECT_DIR}/project.yaml"

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          # reference.docx is the intermediate pandoc style reference — skip it
          find "${PROJECT_DIR}/build" -maxdepth 1 -name '*.docx' ! -name 'reference.docx' -exec cp {} release-artifacts/ \;
          ls -l release-artifacts
          test -n "$(ls release-artifacts)"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Document build ${{ github.run_number }}
          files: release-artifacts/*
          body: |
            DOCX built from ${{ env.SOURCE_SHA }} by SpecCompiler (ABNT model).
