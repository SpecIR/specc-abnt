name: Build, Test, and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BASE_IMAGE: ghcr.io/specir/speccompiler:latest
  TEST_IMAGE: specc-abnt:test

jobs:
  # ---------------------------------------------------------------------------
  # Pull requests build and test the image locally.
  # Merges to main build, test, and then publish to GHCR.
  # ---------------------------------------------------------------------------
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build image for tests
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.TEST_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BASE_IMAGE=${{ env.BASE_IMAGE }}
          cache-from: type=gha,scope=abnt-model
          cache-to: type=gha,mode=max,scope=abnt-model

      - name: Smoke test
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${TEST_IMAGE}" \
            build examples/project.yaml

          test -f examples/build/monografia.docx

      - name: Run model tests
        run: |
          docker run --rm \
            -e SPECCOMPILER_HOME=/opt/speccompiler \
            --entrypoint bash \
            "${TEST_IMAGE}" \
            /opt/speccompiler/tests/run.sh abnt-tests

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BASE_IMAGE=${{ env.BASE_IMAGE }}
          cache-from: type=gha,scope=abnt-model
          cache-to: type=gha,mode=max,scope=abnt-model

      - name: Make package public
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          curl -sf -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}" \
            -d '{"visibility":"public"}' || echo "::warning::Could not set package visibility to public"

  # The example DOCX is published as a GitHub release by
  # .github/workflows/publish-document.yml after this workflow succeeds on main.
